name: CI — Gatekeeper

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  gate:
    name: Gatekeeper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

      - name: Run Gatekeeper
        run: bash scripts/gatekeeper.sh
        # exit 非 0 → PR 无法合并，无例外

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage.html
